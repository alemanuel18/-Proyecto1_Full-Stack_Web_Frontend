<!-- ── MODAL: CREAR / EDITAR SERIE ────────────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Nueva serie</h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>

    <div class="modal-body">

      <!-- Cover upload -->
      <div class="cover-upload" id="cover-upload-area">
        <img id="cover-preview" src="" alt="" class="cover-preview hidden" />
        <div id="cover-placeholder" class="cover-placeholder">
          <span class="upload-icon">🖼</span>
          <span>Subir portada</span>
          <span class="upload-hint">JPG, PNG, WEBP · máx 1MB</span>
        </div>
        <input type="file" id="cover-input" accept="image/jpeg,image/png,image/gif,image/webp" class="hidden" />
      </div>

      <!-- Fields -->
      <div class="modal-fields">
        <div class="field">
          <label>Título <span class="required">*</span></label>
          <input type="text" id="field-title" placeholder="Breaking Bad" />
        </div>

        <div class="field-row">
          <div class="field">
            <label>Género</label>
            <input type="text" id="field-genre" placeholder="Drama, Thriller..." />
          </div>
          <div class="field">
            <label>Episodios</label>
            <input type="number" id="field-episodes" placeholder="62" min="1" />
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label>Estado</label>
            <select id="field-status">
              <option value="plan_to_watch">Pendiente</option>
              <option value="watching">Viendo</option>
              <option value="completed">Completada</option>
              <option value="dropped">Abandonada</option>
            </select>
          </div>
          <div class="field">
            <label>Rating (1–10)</label>
            <input type="number" id="field-rating" placeholder="8" min="1" max="10" />
          </div>
        </div>

        <div class="field">
          <label>Descripción</label>
          <textarea id="field-description" rows="3" placeholder="Un químico de secundaria..."></textarea>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <div id="modal-error" class="form-error hidden"></div>
      <button class="btn-ghost" id="modal-cancel">Cancelar</button>
      <button class="btn-primary" id="modal-save">Guardar</button>
    </div>
  </div>
</div>
