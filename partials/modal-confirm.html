<!-- ── MODAL: CONFIRMAR ELIMINACIÓN ───────────────────────────────────────── -->
<div id="confirm-overlay" class="modal-overlay hidden">
  <div class="modal modal--sm">
    <div class="modal-header">
      <h3>¿Eliminar serie?</h3>
      <button class="modal-close" id="confirm-close">✕</button>
    </div>
    <div class="modal-body" style="display:block; padding: 20px 24px;">
      <p style="color:var(--text-muted)">Esta acción no se puede deshacer.</p>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" id="confirm-cancel">Cancelar</button>
      <button class="btn-danger" id="confirm-delete">Eliminar</button>
    </div>
  </div>
</div>
